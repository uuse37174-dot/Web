<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta name="theme-color" content="#39FF14" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SearchScrape" />
    <link rel="apple-touch-icon" href="/icon-512.jpg" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/jpeg" href="/icon-512.jpg" />
    <title>SearchScrape V2.6 Enterprise</title>
  </head>
  <body style="background-color: #0F1117;">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("/sw.js")
            .then((reg) => {
              console.log("[PWA] ServiceWorker registered with scope: ", reg.scope);
            })
            .catch((err) => {
              console.error("[PWA] ServiceWorker registration failed: ", err);
            });
        });
      }
    </script>
  </body>
</html>
